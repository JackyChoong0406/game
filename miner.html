<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Miner: Realistic 2D Edition</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Verdana', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        canvas {
            background-color: #4e342e; /* Base dirt color */
            border: 4px solid #3e2723;
            border-radius: 4px;
            cursor: crosshair;
        }
        .ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.8);
            pointer-events: none; /* Let clicks pass through UI */
        }
        .ui span { color: #ffd700; } /* Gold color for numbers */
        #instructions {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">60</span>s</div>
        </div>
        <canvas id="gameCanvas" width="800" height="550"></canvas>
        <div id="instructions">Press <b>SPACE</b> or <b>CLICK</b> to launch</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');

        // Game State
        let score = 0;
        let timeLeft = 60;
        let gameOver = false;

        // Hook Properties
        const hook = {
            x: canvas.width / 2,
            y: 70,
            angle: 0,
            angleSpeed: 0.02,
            length: 40,
            baseLength: 40,
            maxLength: 560,
            state: 'swinging', 
            speed: 7,
            target: null,
            minAngle: -Math.PI / 2 + 0.1, // Prevent hitting sky
            maxAngle: Math.PI / 2 - 0.1
        };

        // Item Definitions
        let items = [];
        const itemTypes = {
            SMALL_GOLD: { radius: 12, value: 50,  weight: 9, type: 'gold' },
            MED_GOLD:   { radius: 25, value: 150, weight: 5, type: 'gold' },
            LARG_GOLD:  { radius: 40, value: 500, weight: 2, type: 'gold' },
            ROCK:       { radius: 22, value: 20,  weight: 3, type: 'rock' }
        };

        // Helper to generate irregular shape points
        function generateIrregularShape(radius, points = 8) {
            let shape = [];
            for (let i = 0; i < points; i++) {
                let angle = (i / points) * Math.PI * 2;
                // Distort radius randomly between 70% and 100%
                let distortion = 0.7 + Math.random() * 0.3;
                shape.push({
                    x: Math.cos(angle) * radius * distortion,
                    y: Math.sin(angle) * radius * distortion
                });
            }
            return shape;
        }

        function initItems() {
            items = [];
            const types = Object.values(itemTypes);
            for (let i = 0; i < 12; i++) {
                let type = types[Math.floor(Math.random() * types.length)];
                items.push({
                    x: Math.random() * (canvas.width - 150) + 75,
                    y: Math.random() * (canvas.height - 220) + 170,
                    shape: generateIrregularShape(type.radius, type.type === 'gold' ? 10 : 6),
                    ...type
                });
            }
        }

        // Input handling
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') launchHook(); });
        canvas.addEventListener('mousedown', launchHook);

        function launchHook() {
            if (hook.state === 'swinging' && !gameOver) {
                hook.state = 'extending';
            } else if (gameOver) {
                resetGame();
            }
        }

        function update() {
            if (gameOver) return;

            if (hook.state === 'swinging') {
                hook.angle += hook.angleSpeed;
                if (hook.angle > hook.maxAngle || hook.angle < hook.minAngle) {
                    hook.angleSpeed *= -1;
                }
            } 
            else if (hook.state === 'extending') {
                hook.length += hook.speed;
                const hx = hook.x + Math.sin(hook.angle) * hook.length;
                const hy = hook.y + Math.cos(hook.angle) * hook.length;

                if (hx < 0 || hx > canvas.width || hy > canvas.height || hook.length > hook.maxLength) {
                    hook.state = 'retracting';
                }

                items.forEach((item, index) => {
                    if (Math.hypot(hx - item.x, hy - item.y) < item.radius) {
                        hook.target = item;
                        items.splice(index, 1);
                        hook.state = 'retracting';
                    }
                });
            } 
            else if (hook.state === 'retracting') {
                let pullSpeed = hook.target ? (hook.speed * (hook.target.weight / 10)) : hook.speed;
                hook.length -= pullSpeed;

                if (hook.length <= hook.baseLength) {
                    hook.length = hook.baseLength;
                    hook.state = 'swinging';
                    if (hook.target) {
                        score += hook.target.value;
                        scoreElement.innerText = score;
                        hook.target = null;
                    }
                }
            }
        }

        // --- REALISTIC DRAWING FUNCTIONS ---

        function drawIrregularPath(ctx, item) {
            ctx.beginPath();
            ctx.moveTo(item.x + item.shape[0].x, item.y + item.shape[0].y);
            for (let i = 1; i < item.shape.length; i++) {
                ctx.lineTo(item.x + item.shape[i].x, item.y + item.shape[i].y);
            }
            ctx.closePath();
        }

        function drawGold(ctx, item) {
            ctx.save();
            
            // 1. Shadow/Outer Glow
            ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
            ctx.shadowBlur = 15;
            
            // 2. Create the Path
            drawIrregularPath(ctx, item);

            // 3. Create Radial Gradient for Shine
            // Gradient center is slightly offset to top-left
            let gradient = ctx.createRadialGradient(
                item.x - item.radius/3, item.y - item.radius/3, 0,
                item.x, item.y, item.radius
            );
            gradient.addColorStop(0, '#fff3b0'); // Bright highlight
            gradient.addColorStop(0.3, '#ffca28'); // Main gold
            gradient.addColorStop(0.8, '#f57c00'); // Deep gold
            gradient.addColorStop(1, '#81d4fa00');   // Fade outline edge

            ctx.fillStyle = gradient;
            ctx.fill();

            // 4. Add rough texture marks
            ctx.strokeStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore();
        }

        function drawRock(ctx, item) {
            ctx.save();
            
            // 1. Path
            drawIrregularPath(ctx, item);

            // 2. Linear Gradient for shading
            let gradient = ctx.createLinearGradient(
                item.x - item.radius, item.y - item.radius,
                item.x + item.radius, item.y + item.radius
            );
            gradient.addColorStop(0, '#9e9e9e'); // Light grey (top-left)
            gradient.addColorStop(0.5, '#616161'); // Mid grey
            gradient.addColorStop(1, '#212121'); // Dark grey (bottom-right)

            ctx.fillStyle = gradient;
            ctx.fill();

            // 3. Rough edge effect
            ctx.strokeStyle = '#424242';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 4. Inner Cracks/Shadows
            ctx.beginPath();
            ctx.moveTo(item.x - item.radius/2, item.y);
            ctx.lineTo(item.x + item.radius/3, item.y + item.radius/3);
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore();
        }

        function drawBackgroundTexture() {
            // Draw rough dirt specks
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            for(let i=0; i<500; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * (canvas.height - 70) + 70;
                let size = Math.random() * 3;
                ctx.fillRect(x, y, size, size);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Underground Background
            ctx.fillStyle = '#4e342e';
            ctx.fillRect(0, 70, canvas.width, canvas.height);
            drawBackgroundTexture();

            // Draw Sky/Top area
            ctx.fillStyle = '#a7ffeb';
            ctx.fillRect(0, 0, canvas.width, 70);

            // Draw the Miner (Simple Cartesian representation)
            ctx.fillStyle = '#333'; // Boots
            ctx.fillRect(hook.x - 20, 50, 40, 20);
            ctx.fillStyle = '#ff5722'; // Shirt
            ctx.fillRect(hook.x - 15, 30, 30, 25);
            ctx.fillStyle = '#ffccbc'; // Face
            ctx.beginPath(); ctx.arc(hook.x, 25, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#795548'; // Hat
            ctx.fillRect(hook.x - 12, 12, 24, 8);

            // Calculate Hook tip position
            const hx = hook.x + Math.sin(hook.angle) * hook.length;
            const hy = hook.y + Math.cos(hook.angle) * hook.length;
            
            // Draw Rope
            ctx.strokeStyle = '#d7ccc8';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(hook.x, hook.y); ctx.lineTo(hx, hy); ctx.stroke();

            // Draw Hook Tip (Claw shape)
            ctx.save();
            ctx.translate(hx, hy);
            ctx.rotate(-hook.angle);
            ctx.strokeStyle = '#9e9e9e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            // Left claw
            ctx.moveTo(0,0); ctx.quadraticCurveTo(-10, 10, -5, 20);
            // Right claw
            ctx.moveTo(0,0); ctx.quadraticCurveTo(10, 10, 5, 20);
            ctx.stroke();
            ctx.restore();

            // Draw Gold and Rocks on the ground
            items.forEach(item => {
                if (item.type === 'gold') drawGold(ctx, item);
                else drawRock(ctx, item);
            });

            // Draw Pulled Item
            if (hook.target) {
                let caughtItem = {...hook.target, x: hx, y: hy};
                if (caughtItem.type === 'gold') drawGold(ctx, caughtItem);
                else drawRock(ctx, caughtItem);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 50px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText("SHIFT OVER!", canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = 'white';
                ctx.font = '30px Courier New';
                ctx.fillText("Total Value: $" + score, canvas.width/2, canvas.height/2 + 40);
                ctx.font = '18px Courier New';
                ctx.fillText("Click to Restart", canvas.width/2, canvas.height/2 + 90);
            }
        }

        // --- Game Loop and Logic ---

        const timerInterval = setInterval(() => {
            if (!gameOver) {
                timeLeft--;
                timerElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    gameOver = true;
                }
            }
        }, 1000);

        function resetGame() {
            score = 0;
            timeLeft = 60;
            scoreElement.innerText = score;
            timerElement.innerText = timeLeft;
            gameOver = false;
            hook.length = hook.baseLength;
            hook.state = 'swinging';
            hook.target = null;
            initItems();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initItems();
        gameLoop();
    </script>
</body>
</html>
