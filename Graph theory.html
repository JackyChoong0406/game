<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Stroke: Clean Path</title>
    <style>
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif;
            user-select: none; touch-action: none;
        }
        #ui-layer { display: flex; gap: 30px; margin-bottom: 15px; background: #1e293b; padding: 15px 30px; border-radius: 50px; border: 2px solid #334155; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .stat-value { font-size: 1.6rem; font-weight: bold; display: block; }
        #timer-val { color: #fbbf24; }
        #score-val { color: #22c55e; }

        canvas { background: #ffffff; border-radius: 12px; cursor: crosshair; }
        
        .controls { margin-top: 20px; display: flex; gap: 12px; }
        button {
            padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-size: 0.9rem; text-transform: uppercase;
        }
        .btn-skip { background: #334155; color: #f87171; }
        .btn-impossible { background: #7c3aed; color: white; }
        .btn-reset { background: #f1f5f9; color: #0f172a; }

        #msg { height: 30px; margin-top: 15px; font-size: 1.1rem; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-box"><span class="stat-label">Marks</span><span id="score-val" class="stat-value">0</span></div>
        <div class="stat-box"><span class="stat-label">Time</span><span id="timer-val" class="stat-value">50</span></div>
    </div>

    <canvas id="gameCanvas" width="460" height="400"></canvas>

    <div id="msg">Follow the path!</div>

    <div class="controls">
        <button class="btn-reset" onclick="resetLevel()">Reset</button>
        <button class="btn-impossible" onclick="claimImpossible()">Impossible!</button>
        <button class="btn-skip" onclick="skipLevel()">Skip (-3s)</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [], edges = [], lastNode = null, hoverNode = null;
        let marks = 0, timeLeft = 50, gameActive = true;

        const timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            document.getElementById('timer-val').innerText = timeLeft;
            if (timeLeft <= 0) {
                gameActive = false;
                alert("Game Over! Marks: " + marks);
                location.reload();
            }
        }, 1000);

        function generateLevel() {
            nodes = []; edges = []; lastNode = null;
            const numNodes = 5;

            // 1. Spaced Node Generation
            for(let i=0; i<numNodes; i++) {
                let attempts = 0;
                while(attempts < 100) {
                    let n = { x: 60 + Math.random() * 340, y: 60 + Math.random() * 280 };
                    let tooClose = nodes.some(ex => Math.hypot(ex.x-n.x, ex.y-n.y) < 90);
                    if(!tooClose) { nodes.push(n); break; }
                    attempts++;
                }
            }

            // 2. Controlled Path Generation (Reduces "Too Many Ways")
            // This creates a single continuous chain first
            for(let i=0; i < nodes.length - 1; i++) {
                edges.push({ a: i, b: i+1, done: false });
            }
            
            // Add exactly 1-2 random extra connections to make it a "puzzle"
            let extraEdges = 0;
            while(extraEdges < 1) {
                let a = Math.floor(Math.random() * nodes.length);
                let b = Math.floor(Math.random() * nodes.length);
                if (a !== b && !edges.some(e => (e.a === a && e.b === b) || (e.a === b && e.b === a))) {
                    edges.push({ a: a, b: b, done: false });
                    extraEdges++;
                }
            }

            // Occasionally make it impossible by adding one more stray edge to a random node
            if(Math.random() > 0.7) {
                let a = Math.floor(Math.random() * nodes.length);
                let b = Math.floor(Math.random() * nodes.length);
                if (a !== b) edges.push({ a: a, b: b, done: false });
            }

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            edges.forEach(e => {
                ctx.beginPath();
                ctx.moveTo(nodes[e.a].x, nodes[e.a].y);
                ctx.lineTo(nodes[e.b].x, nodes[e.b].y);
                ctx.strokeStyle = e.done ? '#22c55e' : '#e2e8f0';
                ctx.lineWidth = e.done ? 10 : 5;
                ctx.lineCap = 'round';
                ctx.stroke();
            });
            nodes.forEach((n, i) => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, 16, 0, Math.PI*2);
                ctx.fillStyle = (i === lastNode) ? '#ef4444' : (i === hoverNode ? '#3b82f6' : '#1e293b');
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) };
        }

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            let found = null;
            nodes.forEach((n, i) => { if(Math.hypot(n.x - pos.x, n.y - pos.y) < 25) found = i; });
            if(hoverNode !== found) { hoverNode = found; draw(); }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive || hoverNode === null) return;
            if (lastNode === null) { lastNode = hoverNode; } 
            else {
                const edge = edges.find(e => !e.done && ((e.a === lastNode && e.b === hoverNode) || (e.a === hoverNode && e.b === lastNode)));
                if (edge) {
                    edge.done = true; lastNode = hoverNode;
                    if (edges.every(e => e.done)) {
                        updateStats(10 + (edges.length * 10), 3, "SOLVED! +3s");
                        generateLevel();
                    }
                } else {
                    document.getElementById('msg').innerText = "Blocked!";
                    document.getElementById('msg').style.color = "#f59e0b";
                }
            }
            draw();
        });

        function claimImpossible() {
            let oddNodes = 0;
            nodes.forEach((_, i) => { if (edges.filter(e => e.a === i || e.b === i).length % 2 !== 0) oddNodes++; });
            if (oddNodes !== 0 && oddNodes !== 2) {
                updateStats(50, 5, "CORRECT! +50 Marks");
                generateLevel();
            } else { updateStats(0, -2, "WRONG! Solvable. -2s"); }
        }

        function skipLevel() { updateStats(0, -3, "Skipped. -3s"); generateLevel(); }
        function resetLevel() { edges.forEach(e => e.done = false); lastNode = null; draw(); }
        function updateStats(m, t, msgText) {
            marks += m; timeLeft += t;
            document.getElementById('score-val').innerText = marks;
            const msg = document.getElementById('msg');
            msg.innerText = msgText;
            msg.style.color = t > 0 ? "#22c55e" : "#f87171";
        }

        generateLevel();
    </script>
</body>
</html>
